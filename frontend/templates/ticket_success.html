{% extends "base.html" %}

{% block content %}
<section class="card">
  <h1>Reporte enviado</h1>
  <p class="muted">Tu incidencia ha sido registrada correctamente. Gracias por colaborar con la ciudad.</p>

  <div class="summary">
    <p><strong>ID:</strong> {{ ticket.id }}</p>
    <p><strong>Categoría:</strong> {{ ticket.categoria }}</p>
    <p><strong>Estado:</strong> {{ ticket.status }}</p>
  </div>

  <div class="stack">
    <a class="button" href="/">Enviar otro reporte</a>
    <a class="button secondary" href="/">Volver al inicio</a>
  </div>
</section>
{% endblock %}
