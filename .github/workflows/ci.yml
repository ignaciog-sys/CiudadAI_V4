name: CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/dev-requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/dev-requirements.txt

      - name: Lint backend
        run: ruff check backend/src backend/tests

      - name: Test backend
        run: pytest -q backend/tests

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: frontend/requirements.txt

      - name: Install frontend dependencies
        run: |
          pip install -r frontend/requirements.txt
          pip install pytest

      - name: Test frontend
        working-directory: frontend
        run: pytest -q tests
